<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Event Planner{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'events/style.css' %}">
</head>
<body>

<div class="app-container">
    <div class="content">
        {% if messages %}
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

    <nav class="bottom-nav">
        <a href="{% url 'home' %}" class="nav-btn">
            <span class="nav-icon">👤</span>
        </a>
        <a href="{% url 'event_create' %}" class="nav-btn nav-btn-center">
            <span class="nav-icon">+</span>
        </a>
        <a href="{% url 'login' %}" class="nav-btn">
            <span class="nav-icon">⚙️</span>
        </a>
    </nav>
</div>

</body>
</html>
