{% extends 'events/base.html' %}

{% block title %}Attendees{% endblock %}

{% block content %}
<div class="page-header">
    <a href="{% url 'event_detail' event.pk %}" class="back-btn">‹</a>
    <h1 class="page-title">ATTENDEES</h1>
</div>

<div class="list-container">
    {% for reg in registrations %}
        <div class="list-item">
            <span class="item-name">{{ reg.user.username }}</span>
            <span class="item-meta">{{ event.title }}</span>
        </div>
    {% empty %}
        <div class="list-item">
            <span class="item-name">Žiadni účastníci.</span>
        </div>
    {% endfor %}
</div>
{% endblock %}
